; ============================================================================
; PlatformIO Project Configuration File
; Firmware de Aquisição de Vibrações - ESP32 + 4x MPU9250
; ============================================================================

[env:esp32doit-devkit-v1]
platform  = espressif32
board     = esp32doit-devkit-v1
framework = arduino

; Velocidade do Serial Monitor
monitor_speed = 115200

; Biblioteca de I2C por software (bit-banging), necessária para o barramento
; independente do LCD (GPIO25/GPIO26), que NÃO pode compartilhar o barramento
; de hardware usado pelos MPUs.
; Biblioteca "SoftwareWire" de Testato: implementa uma interface compatível
; com TwoWire, permitindo instanciar quantos barramentos por software forem
; necessários em quaisquer pinos digitais.
lib_deps =
    testato/SoftwareWire @ ^1.6.4

build_flags =
    -Wall
    -Wextra
    -std=gnu++17
build_unflags =
    -std=gnu++11
